<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aldana & Angel</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<!-- INTRO -->
<section id="intro">
  <div class="envelope-container">
    <img src="img.sobresinfondo.png" class="envelope">
    <div class="seal" onclick="abrirSobre()">
      <img src="img.sobreicono.png" class="seal-img">
    </div>
  </div>
</section>

<!-- HOJA 1 -->
<section id="hoja1" class="hidden">
  <div class="pantalla1">
    <img src="img.portada.jpg" class="imagen-full">
    <div class="flecha" onclick="bajar()">⌄</div>
  </div>
</section>

<!-- HOJA 2 (CONTADOR) -->
<section id="hoja2" class="hidden">
  <div class="contador-section">
    <img src="img.contador.jpg" class="fondo-contador">
    <div class="overlay-contador"></div>

    <div class="contenido-contador">
      <h2 class="titulo-contador">FALTAN</h2>

      <div class="contador">
        <div class="bloque">
          <span id="dias">00</span>
          <p>Días</p>
        </div>
        <div class="bloque">
          <span id="horas">00</span>
          <p>Hr</p>
        </div>
        <div class="bloque">
          <span id="minutos">00</span>
          <p>Min</p>
        </div>
        <div class="bloque">
          <span id="segundos">00</span>
          <p>Seg</p>
        </div>
      </div>
    </div>

    <!-- flecha a hoja 3 -->
    <div class="flecha" onclick="bajarA3()">⌄</div>

  </div>
</section>

<!-- HOJA 3 -->
<section id="hoja3" class="hidden">
  <div class="pantalla3">
    <img src="img.ceremonia.jpg" class="imagen-full">

    <a href="https://www.google.com/maps?q=Belgrano+327,+Morón,+Buenos+Aires"
    target="_blank" class="btn-maps">
    Cómo llegar
    </a>

    <div class="flecha" onclick="bajarA4()">⌄</div>
  </div>
</section>

<!-- HOJA 4 -->
<section id="hoja4" class="hidden">
  <div class="pantalla4">
    <img src="img.salon.jpg" class="imagen-full">

    <a href="https://www.google.com/maps?q=Au+Acceso+Oeste+31,+Paso+del+Rey,+Buenos+Aires"
    target="_blank" class="btn-maps">
    Cómo llegar
    </a>
  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
