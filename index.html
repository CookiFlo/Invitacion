<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aldana & Angel</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
</head>

<body>

<!-- INTRO -->

<section id="intro">

<div class="envelope-container">

<img src="img/sobresinfondo.png" class="envelope">

<div class="seal" onclick="abrirSobre()">
<img src="img/sobreicono.png" class="seal-img">
</div>

</div>

</section>


<!-- HOJA 1 -->

<section id="hoja1" class="hidden">

<div class="pantalla1">

<img src="img/portada.jpg" class="imagen-full">

<div class="flecha" onclick="bajar()">⌄</div>

</div>

</section>


<!-- HOJA 2 (CONTADOR) -->

<section id="hoja2" class="hidden">

<div class="contador-section">

<img src="img/contador.jpg" class="fondo-contador">

<div class="overlay-contador"></div>

<div class="contenido-contador">

<h2 class="titulo-contador">FALTAN</h2>

<div class="contador">

<div class="bloque">
<span id="dias">00</span>
<p>Días</p>
</div>

<div class="bloque">
<span id="horas">00</span>
<p>Hr</p>
</div>

<div class="bloque">
<span id="minutos">00</span>
<p>Min</p>
</div>

<div class="bloque">
<span id="segundos">00</span>
<p>Seg</p>
</div>

</div>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
